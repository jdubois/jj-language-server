name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Clone Spring PetClinic test fixture
        run: |
          PETCLINIC_SHA=$(cat test-fixtures/spring-petclinic-sha.txt)
          git clone https://github.com/spring-projects/spring-petclinic.git test-fixtures/spring-petclinic
          cd test-fixtures/spring-petclinic && git checkout "$PETCLINIC_SHA"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:run
